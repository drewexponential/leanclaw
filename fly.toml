app            = "tepid-claw"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"
  target     = "base"
  [build.args]
    OPENCLAW_VERSION = "latest"

[env]
  NODE_COMPILE_CACHE = "/var/tmp/openclaw-compile-cache"
  NODE_ENV           = "production"
  NODE_OPTIONS       = "--max-old-space-size=1536"

[[vm]]
  size   = "shared-cpu-2x"
  memory = "2gb"
  cpus   = 2

[[mounts]]
  source      = "openclaw_data"
  destination = "/data"
